<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>RevierKompass</title>
    <script>
      // Verhindert FOUC (Flash of Unstyled Content) und lädt gespeichertes Theme
      (function() {
        try {
          // Versuche localStorage, dann sessionStorage
          let savedTheme = localStorage.getItem('theme');
          if (!savedTheme) {
            savedTheme = sessionStorage.getItem('theme');
          }
          
          const root = document.documentElement;
          
          if (savedTheme === 'light') {
            root.classList.add('light');
          } else if (savedTheme === 'dark') {
            root.classList.add('dark');
          } else {
            // System theme - Standard beim ersten Start
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
              root.classList.add('dark');
            } else {
              root.classList.add('light');
            }
          }
        } catch (error) {
          // Fallback zu System-Theme bei Fehlern
          const root = document.documentElement;
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            root.classList.add('dark');
          } else {
            root.classList.add('light');
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
